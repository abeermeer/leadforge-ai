version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: trax9_leads
      POSTGRES_USER: trax9
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://trax9:${DB_PASSWORD:-password}@db:5432/trax9_leads
      REDIS_URL: redis://redis:6379/0
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx;httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://trax9:${DB_PASSWORD:-password}@db:5432/trax9_leads
      REDIS_URL: redis://redis:6379/0
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=5 -Q profile,discovery,email_find,audit,email
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://trax9:${DB_PASSWORD:-password}@db:5432/trax9_leads
      REDIS_URL: redis://redis:6379/0
    command: celery -A tasks.celery_app beat --loglevel=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
